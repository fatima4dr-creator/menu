window._openCart=function(){rci();document.getElementById('cartOverlay').classList.add('show');document.getElementById('cartDrawer').classList.add('show');document.body.style.overflow='hidden'};
window._closeCart=function(){document.getElementById('cartOverlay').classList.remove('show');document.getElementById('cartDrawer').classList.remove('show');document.body.style.overflow=''};
window._clearCart=function(){if(confirm('هل تريد حقاً مسح جميع الأصناف؟')){cart=[];ucu();ucb();rci()}};
window._changeQty=function(id,d){var item=cart.find(function(c){return c.id==id});if(!item)return;item.qty+=d;if(item.qty<=0)cart=cart.filter(function(c){return c.id!=id});ucu();ucb();rci();if(!cart.length)window._closeCart()};
window._updateNote=function(id,t){var item=cart.find(function(c){return c.id==id});if(item)item.note=t};
function rci(){var con=document.getElementById('cartItemsList');if(!cart.length){con.innerHTML='<div style="text-align:center;padding:30px;color:var(--t3)"><i class="bi bi-cart" style="font-size:40px;display:block;margin-bottom:10px;opacity:.3"></i><p>لا توجد أصناف</p></div>';document.getElementById('cartTotal').textContent='';document.getElementById('sendOrderBtn').disabled=true;return}var h='';cart.forEach(function(item){var hi=!!item.img;h+='<div class="cart-item">';if(hi)h+='<img class="cart-item-img" src="'+item.img+'" alt="">';else h+='<div class="cart-item-img" style="display:flex;align-items:center;justify-content:center;background:var(--card)"><i class="bi bi-box-seam" style="font-size:20px;color:var(--t3)"></i></div>';h+='<div class="cart-item-info"><div class="cart-item-name">'+e(item.name)+'</div><div class="cart-item-price">'+cur+' '+fp(item.price)+'</div></div>';h+='<div class="cart-item-qty"><button class="qty-btn remove" onclick="window._changeQty('+item.id+',-1)">−</button><span class="qty-val">'+item.qty+'</span><button class="qty-btn" onclick="window._changeQty('+item.id+',1)">+</button></div><input type="text" class="cart-item-note" placeholder="📝 ملاحظات (اختياري)" maxlength="120" value="'+e(item.note||'')+'" onchange="window._updateNote('+item.id+',this.value)"></div>'});con.innerHTML=h;document.getElementById('cartTotal').textContent=cur+' '+fp(gct());document.getElementById('sendOrderBtn').disabled=false}
window._previewOrder=function(){if(!cart.length)return;var cn=document.getElementById('customerName').value.trim();var card=document.getElementById('orderPreviewCard');var h='<div class="order-preview-header"><h3>OUI POS</h3><p>🛒 معاينة الطلب'+(cn?' — '+e(cn):'')+'</p></div>';h+='<div class="order-preview-items">';cart.forEach(function(item){var hi=!!item.img;h+='<div class="op-item">';if(hi)h+='<img src="'+item.img+'" alt="">';else h+='<div style="width:50px;height:50px;border-radius:10px;display:flex;align-items:center;justify-content:center;background:#eee"><i class="bi bi-box-seam" style="font-size:20px;color:#999"></i></div>';h+='<div class="op-item-info"><div class="op-item-name">'+e(item.name)+'</div><div class="op-item-meta">'+cur+' '+fp(item.price)+' × '+item.qty+'</div>'+(item.note?'<div class="op-item-note"><i class="bi bi-pencil"></i> '+e(item.note)+'</div>':'')+'</div>';h+='<div class="op-item-total">'+cur+' '+fp(item.price*item.qty)+'</div></div>'});h+='</div>';h+='<div class="order-preview-footer"><span class="op-total-label">المجموع الكلي</span><span class="op-total-value">'+cur+' '+fp(gct())+'</span></div>';h+='<div class="order-preview-actions"><button class="op-back-btn" onclick="window._closePreview()"><i class="bi bi-arrow-right"></i> رجوع</button><button class="op-send-btn" onclick="window._sendWhatsApp()"><i class="bi bi-whatsapp"></i> إرسال عبر واتساب</button></div>';card.innerHTML=h;window._orderCN=cn;document.getElementById('orderPreview').classList.add('show');document.body.style.overflow='hidden'};
window._closePreview=function(){document.getElementById('orderPreview').classList.remove('show');document.body.style.overflow=''};
window._sendWhatsApp=function(){if(!cart.length)return;var cn=window._orderCN||'';var msg='\ud83d\uded2 *\u0637\u0644\u0628 \u062c\u062f\u064a\u062f';if(cn)msg+=' \u2014 '+cn;msg+='*'+NL;msg+='\ud83d\udccd *OUI POS*'+NL;msg+='\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500'+NL;cart.forEach(function(item,i){msg+=(i+1)+'. '+item.name+' \u00d7 '+item.qty+' \u2014 '+cur+' '+fp(item.price*item.qty)+NL;if(item.note)msg+='   \ud83d\udcdd '+item.note+NL});msg+='\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500'+NL;msg+='\ud83d\udcb0 *\u0627\u0644\u0645\u062c\u0645\u0648\u0639: '+cur+' '+fp(gct())+'*'+NL;var phone=waNum.replace(/[^0-9]/g,'');var url=phone?'https://wa.me/'+phone+'?text='+encodeURIComponent(msg):'https://wa.me/?text='+encodeURIComponent(msg);window.open(url,'_blank');document.getElementById('orderPreview').classList.remove('show');window._closeCart()};
rc();rp();
